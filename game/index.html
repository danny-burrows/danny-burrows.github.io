    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    window.devicePixelRatio=2;      //Clear Text

    const width = canvas.offsetWidth;
    const height = canvas.offsetHeight;

    // canvas.style.width = size;
    // canvas.style.height = size;

    const scale = window.devicePixelRatio; 
        
    canvas.width = Math.floor(width * scale);
    canvas.height = Math.floor(height * scale);

    //CSS pixels for coordinate systems
    ctx.scale(scale, scale);
    ctx.font = `${width / 8}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillStyle = "red";
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent-color');

    const x = width / 2;
    const y = height / 2;

    setInterval(() => {
        ctx.beginPath();
        ctx.arc(Math.floor(Math.random() * 1000), Math.floor(Math.random() * 1000), Math.floor(Math.random() * 1000), 0, 2 * Math.PI);
        
        ctx.stroke();

        const textString = "Test Page";
        ctx.fillText(textString, x, y);
        ctx.strokeText(textString, x, y);
    }, 0)
